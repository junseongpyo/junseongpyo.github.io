<div id="misc-root"></div>

<script>
  const PROJECTS = [
    {
      title: "LG ALIVE",
      period: "2024.09 – 2024.12",
      subtitle: "Lead &middot; Design &middot; Frontend Development",
      github: "https://github.com/SWE-ALIVE",
      video: "https://www.youtube.com/watch?v=qRJ9v7GVWLA",
      bullets: [
        "LG Electronics collaboration on a natural language-driven smart home multi-chat system",
      ],
    },
    {
      title: "FORIF OFFICIAL",
      period: "2024.01 – 2025.12",
      subtitle: "Lead &middot; Design &middot; Frontend Development",
      link: "https://forif.org/",
      bullets: [
        "Club administration platform for Hanyang University programming club",
      ],
    },
  ];

  const AWARDS = [
    {
      title: "Hanyang University's Student Achievement Award",
      subtitle: "86th Anniversary",
      organizer: "President, Hanyang University",
      year: 2025,
    },
    {
      title: "Hanyang University's Engineering Competition",
      subtitle: "2nd Place",
      organizer: "Dean of Engineering, Hanyang University",
      year: 2025,
    },
    {
      title: "Information System's IC-PBL Contest",
      subtitle: "2nd Place · LLM smart home system",
      organizer: "LG Electronics",
      year: 2024,
    },
    {
      title: "2024 DIVE",
      subtitle: '3rd Place · "Korail Donghae" LLM app',
      organizer: "Mayor, Busan Metropolitan City",
      year: 2024,
    },
    {
      title: "Global Innovator Festa (GIF)",
      subtitle: "4th Place · ML-based timetable platform",
      organizer: "Mayor, Daegu Metropolitan City",
      year: 2023,
    },
  ];

  const PATENTS = [
    {
      title: "English Problem Creation System Using Multi-Agents",
      appNo: "10-2024-0109541",
      filed: "August 16, 2024",
    },
  ];

  const SKILLS = {
    Programming: ["Python", "C/C++", "TypeScript"],
    Languages: ["Korean (native)", "English (fluent)"],
  };

  function renderEntry(title, date, subtitle) {
    return `<div class="entry">
      <div class="entry-header">
        <span class="entry-title">${title}</span>
        <span class="entry-date">${date}</span>
      </div>
      <div class="entry-subtitle">${subtitle}</div>
    </div>`;
  }

  let html = "";

  html += `<p class="section-title">Projects</p>`;
  html += PROJECTS.map((p) => {
    const links = [
      p.link
        ? `<a class="pub-link" href="${p.link}" target="_blank" rel="noopener noreferrer">Website</a>`
        : "",
      p.github
        ? `<a class="pub-link" href="${p.github}" target="_blank" rel="noopener noreferrer">GitHub</a>`
        : "",
      p.video
        ? `<a class="pub-link" href="${p.video}" target="_blank" rel="noopener noreferrer">Video</a>`
        : "",
    ]
      .filter(Boolean)
      .join('<span class="pub-sep">&middot;</span>');
    const allLinks = [
      p.link ? `<a class="pub-link" href="${p.link}" target="_blank" rel="noopener noreferrer">Website</a>` : "",
      p.github ? `<a class="pub-link" href="${p.github}" target="_blank" rel="noopener noreferrer">GitHub</a>` : "",
      p.video ? `<a class="pub-link" href="${p.video}" target="_blank" rel="noopener noreferrer">Video</a>` : "",
    ].filter(Boolean).join('<span class="pub-sep">&middot;</span>');
    const bulletsEl = p.bullets && p.bullets.length
      ? `<ul>${p.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>`
      : "";
    return `<div class="entry">
      <div class="entry-header">
        <span class="entry-title">${p.title}</span>
        <span class="entry-date">${p.period}</span>
      </div>
      <div class="entry-subtitle">${p.subtitle}</div>
      ${bulletsEl}
      ${allLinks ? `<div class="pub-github">${allLinks}</div>` : ""}
    </div>`;
  }).join("");

  html += `<p class="section-title">Awards</p>`;
  html += AWARDS.sort((a, b) => b.year - a.year)
    .map((a) =>
      renderEntry(a.title, a.year, `${a.subtitle} &middot; ${a.organizer}`),
    )
    .join("");
  html += `<p class="section-title">Patents</p>`;
  html += PATENTS.map((p) =>
    renderEntry(
      p.title,
      p.filed.split(" ").pop(),
      `Patent &middot; App. No: ${p.appNo} &middot; Filed: ${p.filed}`,
    ),
  ).join("");

  html += `<p class="section-title">Skills</p><div class="entry">`;
  html += Object.entries(SKILLS)
    .map(
      ([key, vals]) =>
        `<div style="margin-bottom: 8px; font-size: var(--fs-sm); color: var(--c-text-2);"><strong style="color: var(--c-text);">${key}:</strong> ${vals.join(" &middot; ")}</div>`,
    )
    .join("");
  html += `</div>`;

  document.getElementById("misc-root").innerHTML = html;
</script>
