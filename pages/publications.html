<div id="pub-root"></div>

<script>
  const ME = "Junseong Pyo";
  const PROF = "Yohan Jo";

  const TAGS = {
    SMART_HOME: { label: "Smart Home", bg: "#e6f3f0", color: "#1f6b55" },
    SPEECH: { label: "Speech", bg: "#f0ebf8", color: "#6b3a9a" },
    BENCHMARK: { label: "Benchmark", bg: "#fef3e8", color: "#b05a1a" },
    DATASET: { label: "Dataset", bg: "#e8f5f5", color: "#1a7a7a" },
    EDUCATION: { label: "Education", bg: "#f3f0e8", color: "#6b5a1a" },
  };

  const CONF = {
    ACL: "Annual Meeting of the Association for Computational Linguistics",
    ICLR: "International Conference on Learning Representations",
    ARR: "ACL Rolling Review",
    HCI: "HCI Korea",
  };

  const VENUES = {
    ACL: (year, edition) => ({
      abbr: "ACL",
      name: `Proceedings of the ${edition} ${CONF.ACL}`,
    }),
    ICLR: (year, ordinal) => ({
      abbr: "ICLR",
      name: `The ${ordinal} ${CONF.ICLR}`,
    }),
    ARR: (year, month) => ({ abbr: "ARR", name: `${CONF.ARR}, ${month}` }),
    HCI: (year) => ({ abbr: "HCI Korea", name: `Proceedings of ${CONF.HCI}` }),
  };

  // type: "international" | "domestic"
  // note: accent-colored badge (e.g. "Oral", "Findings")
  // status: muted-gray badge (e.g. "Under Review")
  // coFirst: true if ME is co-first author
  // link: primary paper URL (arXiv, ACL Anthology, etc.)
  // github: optional GitHub repo URL
  const PUBLICATIONS = [
    {
      type: "international",
      title: "SpokenUS: A Spoken User Simulator for Task-Oriented Dialogue",
      venue: VENUES.ARR(2026, "March"),
      status: "Under Review",
      year: 2026,
      tags: [TAGS.SPEECH, TAGS.DATASET],
      authors: ["Jonggeun Lee*", ME + "*", "Jeongmin Park", PROF],
      link: "https://arxiv.org/abs/2603.16783",
      github: "https://github.com/holi-lab/SpokenTOD",
      coFirst: true,
      figure: "/figures/spokenus.png",
    },
    {
      type: "international",
      title:
        "SpeakerSleuth: Evaluating Large Audio-Language Models as Judges for Multi-turn Speaker Consistency",
      venue: VENUES.ACL(2026, "64th"),
      year: 2026,
      tags: [TAGS.SPEECH, TAGS.BENCHMARK],
      authors: ["Jonggeun Lee", ME, "Gyuhyeon Seo", PROF],
      link: "https://arxiv.org/abs/2601.04029",
      github: "https://github.com/holi-lab/SpeakerSleuth",
      figure: "/figures/speakersleuth.png",
    },
    {
      type: "international",
      title:
        "SimuHome: A Temporal- and Environment-Aware Benchmark for Smart Home LLM Agents",
      venue: VENUES.ICLR(2026, "Fourteenth"),
      note: "Oral",
      year: 2026,
      tags: [TAGS.SMART_HOME, TAGS.BENCHMARK],
      authors: [
        "Gyuhyeon Seo",
        "Jungwoo Yang",
        ME,
        "Nalim Kim",
        "Jonggeun Lee",
        PROF,
      ],
      link: "https://arxiv.org/abs/2509.24282",
      github: "https://github.com/holi-lab/SimuHome",
      figure: "/figures/simuhome.png",
    },
    {
      type: "domestic",
      title:
        "B. F. Sword: Blank Inference System with Optimized RAG and Knowledge Distillation",
      venue: VENUES.HCI(2025),
      year: 2025,
      tags: [TAGS.EDUCATION],
      authors: [
        ME,
        "Hyejin Bae",
        "Kitae Kwon",
        "Jina Kim",
        "Woojung Song",
        "Yeonseong Shin",
      ],
      link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12131510",
      // figure: "/figures/bfsword.png",
    },
  ];

  function renderAuthors(authors, coFirst) {
    return (
      authors
        .map((a) => {
          const name = a.replace("*", "");
          const star = a.endsWith("*") ? "*" : "";
          return name === ME
            ? `<strong>${name}${star}</strong>`
            : `${name}${star}`;
        })
        .join(", ") +
      (coFirst ? ' <span class="pub-cofirst">*Co-first authors</span>' : "")
    );
  }

  function pubLink(href, text) {
    return `<a class="pub-link" href="${href}">${text}</a>`;
  }

  function renderPub(p) {
    const venue = p.venue;
    const abbr = venue.abbr || "";
    const noteSuffix = p.note ? ` (${p.note})` : "";
    const venueFull = p.track
      ? `${venue.name}, ${p.track}${noteSuffix}`
      : `${venue.name}${noteSuffix}`;
    const tagsEl =
      p.tags && p.tags.length
        ? `<div class="pub-tags">${p.tags.map((t) => `<span class="pub-tag" style="color:${t.color};border-color:${t.color}">${t.label}</span>`).join("")}</div>`
        : "";
    const titleEl = `<div class="pub-title">${p.title}</div>`;
    let venueLine = `<span class="pub-abbr">[${abbr}]</span> ${venueFull}, ${p.year}`;
    if (p.status)
      venueLine += ` &middot; <span class="pub-status">${p.status}</span>`;
    const footnoteLinks = [
      p.link ? pubLink(p.link, "arXiv") : "",
      p.github ? pubLink(p.github, "GitHub") : "",
    ].filter(Boolean);
    const githubEl = footnoteLinks.length
      ? `<div class="pub-github">${footnoteLinks.join('<span class="pub-sep">&middot;</span>')}</div>`
      : "";
    const figEl = p.figure
      ? `<div class="pub-fig"><img src="${p.figure}" alt="${p.title}" loading="lazy"></div>`
      : "";
    return `<div class="pub">
      <div class="pub-body">
        ${tagsEl}
        ${titleEl}
        <div class="pub-venue">${venueLine}</div>
        <div class="pub-authors">${renderAuthors(p.authors, p.coFirst)}</div>
        ${githubEl}
      </div>
      ${figEl}
    </div>`;
  }

  const SORTED = [...PUBLICATIONS].sort((a, b) => b.year - a.year);

  const PAGE_SIZE = 5;

  function renderVisible(count) {
    const visible = SORTED.slice(0, count);
    const intl = visible.filter((p) => p.type === "international");
    const dom = visible.filter((p) => p.type === "domestic");

    let html = "";
    if (intl.length)
      html += `<p class="section-title">International Publications</p>${intl.map(renderPub).join("")}`;
    if (dom.length)
      html += `<p class="section-title">Domestic Publications</p>${dom.map(renderPub).join("")}`;

    if (count < SORTED.length) {
      const remaining = SORTED.length - count;
      html += `<button class="pub-more" onclick="renderVisible(${SORTED.length})">Show more (${remaining})</button>`;
    } else if (SORTED.length > PAGE_SIZE) {
      html += `<button class="pub-more" onclick="renderVisible(${PAGE_SIZE})">Show less</button>`;
    }

    document.getElementById("pub-root").innerHTML = html;
  }

  renderVisible(PAGE_SIZE);
</script>
