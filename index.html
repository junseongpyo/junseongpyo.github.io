      <aside class="toc">

        <a href="#research">Research Experience</a>

        <a href="#misc"
          >Projects &middot; Awards &middot; Patents &middot; Skills</a
        >
      </aside>
    </div>

    <script>
      // TOC scroll spy
      const tocLinks = document.querySelectorAll(".toc a");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              tocLinks.forEach((a) => a.classList.remove("active"));
              const active = document.querySelector(
                `.toc a[href="#${entry.target.id}"]`,
              );
              if (active) active.classList.add("active");
            }
          });
        },
        { rootMargin: "0px 0px -80% 0px" },
      );

      document
        .querySelectorAll("section[id]")
        .forEach((s) => observer.observe(s));
    </script>
    <script>
      function applyExternalLink(root) {
        root.querySelectorAll("a[href]").forEach((a) => {
          if (a.hostname && a.hostname !== location.hostname) {
            a.target = "_blank";
            a.rel = "noopener";
          }
        });
      }
      applyExternalLink(document);
      new MutationObserver((mutations) => {
        mutations.forEach((m) =>
          m.addedNodes.forEach((n) => {
            if (n.nodeType === 1) applyExternalLink(n);
          }),
        );
      }).observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
